<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>验证码发送页</title>
</head>
<body>
    <input type="text" id="phone" placeholder="请输入手机号">
    <button onclick="sendRequest()">点击提交</button>

    <script>
    async function sendRequest() {
        const phone = document.getElementById('phone').value;
        const url = "https://eolink.o.apispace.com/konghao/batch-ucheck";
        
        // 注意：X-APISpace-Token 必须在服务器端添加以防泄露
        // 这里仅供演示，请将 YOUR_TOKEN 替换为你自己的 Token
        const response = await fetch(url, {
            method: 'POST',
            headers: {
                "X-APISpace-Token": "你的Token填在这里",
                "Content-Type": "application/x-www-form-urlencoded"
            },
            body: "mobiles=" + phone + "&type=0"
        });
        
        const data = await response.json();
        alert("返回结果: " + JSON.stringify(data));
    }
    </script>
</body>
</html>
