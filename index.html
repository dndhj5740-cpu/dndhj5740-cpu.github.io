<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>操作界面</title>
    <style>
        body { font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; background: #eef2f7; }
        .card { background: white; padding: 25px; border-radius: 20px; box-shadow: 0 10px 20px rgba(0,0,0,0.05); width: 85%; max-width: 350px; }
        label { display: block; margin-bottom: 8px; font-size: 14px; color: #333; }
        input { width: 100%; padding: 12px; margin-bottom: 20px; border: 1px solid #ddd; border-radius: 12px; box-sizing: border-box; }
        button { width: 100%; padding: 14px; background: #333; color: white; border: none; border-radius: 30px; font-size: 16px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="card">
        <label>手机号码</label>
        <input type="text" id="phone" placeholder="请输入手机号">
        
        <label>发送次数</label>
        <input type="number" id="count" value="1" readonly>
        
        <!-- 这里已将跳转逻辑移除 -->
        <button id="btn" onclick="handleAction()">下一步</button>
    </div>

    <script>
        function handleAction() {
            // 这里可以添加你需要的其他逻辑，但不会进行页面跳转
            const phone = document.getElementById('phone').value;
            if(!phone) {
                alert('请输入手机号');
            } else {
                alert('已确认号码: ' + phone + '，操作已在当前页面处理。');
            }
        }
    </script>
</body>
</html>
