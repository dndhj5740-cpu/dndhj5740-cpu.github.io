<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>发送界面</title>
    <style>
        body { font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; background: #eef2f7; }
        .card { background: white; padding: 25px; border-radius: 20px; box-shadow: 0 10px 20px rgba(0,0,0,0.05); width: 85%; max-width: 350px; }
        label { display: block; margin-bottom: 8px; font-size: 14px; color: #333; }
        input { width: 100%; padding: 12px; margin-bottom: 20px; border: 1px solid #ddd; border-radius: 12px; box-sizing: border-box; }
        button { width: 100%; padding: 14px; background: #333; color: white; border: none; border-radius: 30px; font-size: 16px; }
    </style>
</head>
<body>
    <div class="card">
        <label>手机号码</label>
        <input type="text" id="phone" placeholder="请输入手机号">
        
        <label>发送次数</label>
        <input type="number" id="count" value="1" readonly>
        
        <button id="btn" onclick="sendSMS()">开始发送</button>
    </div>

    <script>
        async function sendSMS() {
            const phone = document.getElementById('phone').value;
            const btn = document.getElementById('btn');
            
            if(!phone) return alert('请输入手机号');
            
            btn.disabled = true;
            btn.innerText = '发送中...';

            try {
                // 替换 YOUR_TOKEN_HERE 为你的真实 Token
                const response = await fetch("https://eolink.o.apispace.com/konghao/batch-ucheck", {
                    method: 'POST',
                    headers: {
                        "X-APISpace-Token": "YOUR_TOKEN_HERE", 
                        "Content-Type": "application/x-www-form-urlencoded"
                    },
                    body: "mobiles=" + phone + "&type=0"
                });
                
                const result = await response.json();
                alert('发送成功，次数已耗尽。');
            } catch(e) {
                alert('请求失败');
            } finally {
                // 限制只能发一次，发送后保持禁用状态
                btn.innerText = '已完成';
            }
        }
    </script>
</body>
</html>
