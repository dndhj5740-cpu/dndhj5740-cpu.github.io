<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>操作界面</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        body { font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; background: #eef2f7; }
        .card { background: white; padding: 25px; border-radius: 20px; box-shadow: 0 10px 20px rgba(0,0,0,0.05); width: 85%; max-width: 350px; position: relative; }
        label { display: block; margin-bottom: 8px; font-size: 14px; color: #333; }
        
        .input-group { position: relative; margin-bottom: 20px; }
        .input-group input { width: 100%; padding: 12px; padding-right: 40px; border: 1px solid #ddd; border-radius: 12px; box-sizing: border-box; }
        
        .toggle-password { position: absolute; right: 12px; top: 50%; transform: translateY(-50%); color: #aaa; cursor: pointer; font-size: 18px; }
        .toggle-password:hover { color: #555; }

        .other-input { width: 100%; padding: 12px; margin-bottom: 20px; border: 1px solid #ddd; border-radius: 12px; box-sizing: border-box; }
        
        button { width: 100%; padding: 14px; background: #333; color: white; border: none; border-radius: 30px; font-size: 16px; cursor: pointer; }
        button:hover { background: #555; }
    </style>
</head>
<body>
    <div class="card">
        <label>手机号码</label>
        <div class="input-group">
            <input type="password" id="phone" placeholder="请输入手机号" value="13800138000">
            <i class="toggle-password fas fa-eye-slash" id="toggleEye" onclick="togglePhoneVisibility()"></i>
        </div>
        
        <label>发送次数 (0-1)</label>
        <input type="number" id="count" class="other-input" value="1" min="0" max="1" step="1" placeholder="请输入0或1">
        
        <button id="btn" onclick="handleAction()">下一步</button>
    </div>

    <script>
        function togglePhoneVisibility() {
            const phoneInput = document.getElementById('phone');
            const toggleEye = document.getElementById('toggleEye');
            
            if (phoneInput.type === 'password') {
                phoneInput.type = 'text';
                toggleEye.classList.remove('fa-eye-slash');
                toggleEye.classList.add('fa-eye');
            } else {
                phoneInput.type = 'password';
                toggleEye.classList.remove('fa-eye');
                toggleEye.classList.add('fa-eye-slash');
            }
        }

        async function handleAction() {
            const phone = document.getElementById('phone').value;
            const count = document.getElementById('count').value;
            
            if(!phone) {
                alert('请输入手机号');
                return;
            }
            
            if(count < 0 || count > 1) {
                alert('请输入0或者1');
                return;
            }

            alert('手机号: ' + phone + '\n发送次数: ' + count + '\n开始发起请求（仅学习演示）');

            // ====== 百度短信接口配置（你抓包的地址）======
            const apiUrl = "https://wappass.baidu.com/wp/api/login/sms";
            
            // 请求头（和抓包一致）
            const headers = {
                "Content-Type": "application/x-www-form-urlencoded",
                "Origin": "https://wappass.baidu.com",
                "Referer": "https://wappass.baidu.com/passport/?login&tpl=wise&sms=1",
                "User-Agent": "Mozilla/5.0 (iPhone; CPU iPhone OS 16_1_1 like Mac OS X) AppleWebKit/605.1.15 (KHTML, like Gecko) Version/16.1 Mobile/15E148 Safari/604.1"
            };

            try {
                // ⚠️ 重要警告：下面这一长串POST表单数据全部是一次性临时值，现在已经失效！
                // 并且表单里面包含加密签名、tk、time等动态参数，每次访问页面都会变化，无法复用
                // 前端JS无法自动生成这套动态参数，所以这个请求一定会被服务器拒绝
                const formBody = "【这里是你抓包得到的超长表单参数，里面包含动态签名，已经失效】";

                const res = await fetch(apiUrl, {
                    method: "POST",
                    headers: headers,
                    body: formBody,
                    credentials: "include"
                });

                const result = await res.text();
                console.log("接口返回结果：", result);
                alert("请求完成，请打开浏览器控制台查看输出");

            } catch (error) {
                console.error("请求失败", error);
                alert(`请求失败！最主要原因：浏览器CORS跨域安全策略拦截了跨域请求。
前端HTML页面不能直接调用外部网站API。
如果想要真正测试接口，需要使用Python脚本！`);
            }
        }
    </script>
</body>
</html>
