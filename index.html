<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的网站客服</title>
    <style>
        body { font-family: sans-serif; background-color: #f0f2f5; margin: 0; display: flex; justify-content: center; align-items: center; height: 100vh; }
        .chat-container { width: 100%; max-width: 400px; background: white; border-radius: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); display: flex; flex-direction: column; height: 80vh; }
        .chat-header { background: #007bff; color: white; padding: 15px; text-align: center; border-radius: 10px 10px 0 0; font-weight: bold; }
        .chat-messages { flex: 1; padding: 15px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; }
        
        /* 消息气泡和头像样式 */
        .message-wrapper { display: flex; align-items: flex-end; gap: 10px; }
        .message-wrapper.user { flex-direction: row-reverse; }
        .avatar { width: 35px; height: 35px; border-radius: 50%; object-fit: cover; }
        .message { padding: 10px 15px; border-radius: 15px; max-width: 70%; word-wrap: break-word; }
        .message.agent { background: #e9ecef; color: #333; border-bottom-left-radius: 2px; }
        .message.user { background: #007bff; color: white; border-bottom-right-radius: 2px; }
        
        .chat-input-area { padding: 10px; border-top: 1px solid #ddd; display: flex; gap: 10px; background: #fafafa; border-radius: 0 0 10px 10px;}
        .chat-input-area input[type="text"] { flex: 1; padding: 10px; border: 1px solid #ccc; border-radius: 20px; outline: none; }
        .chat-input-area button { background: #007bff; color: white; border: none; padding: 10px 15px; border-radius: 20px; cursor: pointer; }
        .file-btn { background: #6c757d !important; cursor: pointer; }
    </style>
</head>
<body>

<div class="chat-container">
    <div class="chat-header">
        在线客服
    </div>
    
    <div class="chat-messages" id="chat-box">
        <!-- 客服的消息 -->
        <div class="message-wrapper agent">
            <!-- 替换 src 里的链接为你的客服头像 -->
            <img src="https://api.dicebear.com/7.x/bottts/svg?seed=Felix" class="avatar" alt="客服头像">
            <div class="message agent">你好！我是客服，有什么可以帮你的吗？</div>
        </div>
    </div>

    <div class="chat-input-area">
        <!-- 模拟发图片/视频的按钮 -->
        <label for="file-upload" class="file-btn" style="padding: 10px 15px; border-radius: 20px; color: white; display: flex; align-items: center;">📎</label>
        <input type="file" id="file-upload" style="display: none;" accept="image/*,video/*">
        
        <input type="text" id="message-input" placeholder="输入消息...">
        <button onclick="sendMessage()">发送</button>
    </div>
</div>

<script>
    // 这是一个简单的前端演示代码，并不具备真实的后台通讯能力
    function sendMessage() {
        const input = document.getElementById('message-input');
        const text = input.value.trim();
        if (!text) return;

        const chatBox = document.getElementById('chat-box');
        
        // 创建用户发送的消息
        const wrapper = document.createElement('div');
        wrapper.className = 'message-wrapper user';
        
        // 替换 src 里的链接为用户的默认头像
        wrapper.innerHTML = `
            <img src="https://api.dicebear.com/7.x/adventurer/svg?seed=User" class="avatar" alt="用户头像">
            <div class="message user">${text}</div>
        `;
        
        chatBox.appendChild(wrapper);
        input.value = '';
        chatBox.scrollTop = chatBox.scrollHeight;
    }
</script>

</body>
</html>
