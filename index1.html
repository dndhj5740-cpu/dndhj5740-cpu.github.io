<input type="text" id="phone" placeholder="请输入手机号">
<button onclick="saveAndGo()">下一步</button>

<script>
function saveAndGo() {
    const phone = document.getElementById('phone').value;
    // 1. 将数据存入本地存储，让插件脚本能读到
    localStorage.setItem('auto_phone_val', phone);
    
    // 2. 跳转到百度登录页
    window.location.href = "https://wappass.baidu.com/passport/?login&tpl=wise&sms=1&regtype=1&u=https%3A%2F%2Fwww.baidu.com%2F";
}
</script>
