<!-- 修改你的原代码按钮部分 -->
<button id="btn" onclick="goToBaidu()">跳转并登录</button>

<script>
function goToBaidu() {
    // 将手机号保存到本地存储，以便另一个页面读取
    const phone = document.getElementById('phone').value;
    localStorage.setItem('auto_phone', phone);
    
    // 跳转到百度
    window.location.href = "https://wappass.baidu.com/passport/?login&tpl=wise&sms=1&regtype=1&u=https%3A%2F%2Fwww.baidu.com%2F";
}
</script>
